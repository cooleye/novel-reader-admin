<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>激活码管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 12px; margin-bottom: 30px; }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .login-container { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .login-container h2 { text-align: center; margin-bottom: 30px; color: #333; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 15px; border: 2px solid #e1e8ed; border-radius: 8px; font-size: 16px; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn:hover { opacity: 0.9; }
        .admin-panel { display: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .stat-card h3 { color: #666; font-size: 14px; margin-bottom: 10px; }
        .stat-card .number { font-size: 36px; font-weight: 700; color: #333; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 30px; }
        .card-header { padding: 20px 25px; border-bottom: 1px solid #e1e8ed; display: flex; justify-content: space-between; align-items: center; }
        .card-body { padding: 25px; }
        .generate-section { display: flex; gap: 15px; align-items: flex-end; }
        .generate-section input { width: 150px; padding: 12px; border: 2px solid #e1e8ed; border-radius: 8px; }
        .generated-codes { margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 8px; display: none; }
        .generated-codes.show { display: block; }
        .codes-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin: 15px 0; }
        .code-item { background: white; padding: 10px 15px; border-radius: 6px; font-family: monospace; font-size: 14px; border: 1px solid #e1e8ed; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #e1e8ed; }
        th { background: #f8f9fa; font-weight: 600; color: #555; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-secondary { background: #e2e3e5; color: #383d41; }
        .logout-btn { position: fixed; top: 20px; right: 20px; padding: 10px 20px; background: white; border: 1px solid #e1e8ed; border-radius: 8px; cursor: pointer; }
        .alert { padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; }
        .alert-error { background: #f8d7da; color: #721c24; }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .empty-state { text-align: center; padding: 60px; color: #999; }
    </style>
</head>
<body>
    <div id="loginPage" class="login-container">
        <h2>🔐 管理员登录</h2>
        <div id="loginError"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>管理员账号</label>
                <input type="text" id="username" placeholder="请输入账号" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn">登录</button>
        </form>
    </div>

    <div id="adminPanel" class="admin-panel">
        <button class="logout-btn" onclick="logout()">退出登录</button>
        <div class="container">
            <div class="header">
                <h1>📚 小说阅读器激活码管理</h1>
                <p>管理激活码、查看使用统计</p>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>总激活码数</h3>
                    <div class="number" id="totalCodes">-</div>
                </div>
                <div class="stat-card">
                    <h3>有效激活码</h3>
                    <div class="number" id="activeCodes">-</div>
                </div>
                <div class="stat-card">
                    <h3>总激活次数</h3>
                    <div class="number" id="totalActivations">-</div>
                </div>
                <div class="stat-card">
                    <h3>唯一设备数</h3>
                    <div class="number" id="uniqueDevices">-</div>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><h2>🎫 生成激活码</h2></div>
                <div class="card-body">
                    <div class="generate-section">
                        <div class="form-group">
                            <label>生成数量</label>
                            <input type="number" id="generateCount" min="1" max="100" value="10">
                        </div>
                        <button class="btn" onclick="generateCodes()">生成激活码</button>
                    </div>
                    <div id="generatedCodes" class="generated-codes">
                        <h4>生成的激活码：</h4>
                        <div class="codes-list" id="codesList"></div>
                        <div style="display: flex; gap: 10px;">
                            <button class="btn btn-success" onclick="saveCodes()">保存到数据库</button>
                            <button class="btn" onclick="exportCodes()" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">📥 导出TXT</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <h2>📋 激活码列表</h2>
                    <button class="btn" onclick="loadCodesList()" style="width:auto;padding:8px 20px;font-size:14px;">刷新</button>
                </div>
                <div class="card-body">
                    <table>
                        <thead><tr><th>激活码</th><th>状态</th><th>创建时间</th><th>使用次数</th></tr></thead>
                        <tbody id="codesTableBody"><tr><td colspan="4" class="empty-state">点击刷新加载数据</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API 配置 - 修改为你的 FC 地址
        const API_BASE = 'https://activatn-server-qbsbwzgfmw.cn-hangzhou.fcapp.run';
        
        let tempGeneratedCodes = [];
        let authToken = localStorage.getItem('adminToken');

        document.addEventListener('DOMContentLoaded', () => {
            if (authToken) showAdminPanel();
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_BASE}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    authToken = result.token;
                    localStorage.setItem('adminToken', authToken);
                    showAdminPanel();
                } else {
                    showError(result.message || '登录失败');
                }
            } catch (error) {
                showError('网络错误，请重试');
            }
        });

        function showError(message) {
            document.getElementById('loginError').innerHTML = `<div class="alert alert-error">${message}</div>`;
        }

        function showAdminPanel() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadStats();
            loadCodesList();
        }

        function logout() {
            localStorage.removeItem('adminToken');
            authToken = null;
            location.reload();
        }

        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/api/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('totalCodes').textContent = result.stats.total_codes;
                    document.getElementById('activeCodes').textContent = result.stats.active_codes;
                    document.getElementById('totalActivations').textContent = result.stats.total_activations;
                    document.getElementById('uniqueDevices').textContent = result.stats.unique_devices;
                }
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        function generateCodes() {
            const count = parseInt(document.getElementById('generateCount').value);
            tempGeneratedCodes = [];
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            
            for (let i = 0; i < count; i++) {
                let code = 'NOVEL-PRO-';
                for (let j = 0; j < 6; j++) {
                    code += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                tempGeneratedCodes.push(code);
            }
            
            document.getElementById('codesList').innerHTML = tempGeneratedCodes.map(code => 
                `<div class="code-item">${code}</div>`
            ).join('');
            
            document.getElementById('generatedCodes').classList.add('show');
        }

        async function saveCodes() {
            if (tempGeneratedCodes.length === 0) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/admin/add-codes`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ codes: tempGeneratedCodes })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert(`成功添加 ${result.results.filter(r => r.success).length} 个激活码`);
                    tempGeneratedCodes = [];
                    document.getElementById('generatedCodes').classList.remove('show');
                    loadStats();
                    loadCodesList();
                } else {
                    alert('保存失败: ' + result.message);
                }
            } catch (error) {
                alert('网络错误，请重试');
            }
        }

        // 导出激活码为TXT文件
        function exportCodes() {
            if (tempGeneratedCodes.length === 0) {
                alert('没有可导出的激活码，请先生成');
                return;
            }
            
            // 生成TXT内容
            const content = tempGeneratedCodes.join('\n');
            
            // 创建Blob
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            
            // 创建下载链接
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `激活码_${new Date().toISOString().slice(0, 10)}_${tempGeneratedCodes.length}个.txt`;
            
            // 触发下载
            document.body.appendChild(a);
            a.click();
            
            // 清理
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            // 显示提示
            alert(`已导出 ${tempGeneratedCodes.length} 个激活码到TXT文件，可用于爱发电平台导入`);
        }

        async function loadCodesList() {
            const tbody = document.getElementById('codesTableBody');
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:40px;">加载中...</td></tr>';
            
            try {
                const response = await fetch(`${API_BASE}/api/admin/codes`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                const result = await response.json();
                
                if (result.success && result.codes.length > 0) {
                    tbody.innerHTML = result.codes.map(code => `
                        <tr>
                            <td><code>${code.code}</code></td>
                            <td><span class="badge ${code.is_active ? 'badge-success' : 'badge-secondary'}">${code.is_active ? '有效' : '已禁用'}</span></td>
                            <td>${new Date(code.created_at).toLocaleString()}</td>
                            <td>${code.usage_count || 0}</td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">暂无激活码</td></tr>';
                }
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-state">加载失败</td></tr>';
            }
        }
    </script>
</body>
</html>
